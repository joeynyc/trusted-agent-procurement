name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 uv run pytest
      - name: Smoke demo
        run: uv run trusted-agent-demo --fast
